name: 🏥 Health Trend Daily Collect

on:
  schedule:
    # 매일 오전 9시 5분 KST (= 00:05 UTC)
    - cron: "5 0 * * *"
  workflow_dispatch:
    # GitHub Actions 탭에서 수동 실행 가능

jobs:
  collect:
    name: 연관 검색어 수집 및 저장
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/ 폴더 커밋·푸시 권한

    steps:
      # 1. 레포 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 의존성 설치
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 수집 실행
      - name: Run collector
        run: python src/collect.py

      # 5. 수집된 CSV 커밋 & 푸시
      - name: Commit and push collected data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경 사항이 없으면 커밋 없이 종료 (오류 X)
          git diff --cached --quiet && echo "변경 없음 — 커밋 스킵" && exit 0
          git commit -m "데이터 수집: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
